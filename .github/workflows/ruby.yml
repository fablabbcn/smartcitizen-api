name: Ruby

on: [push]

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: cloudposse/github-action-docker-compose-test-run@main
        with:
          file: "./compose.yml"
          service: app
          command: "./ci.sh"
          docker-compose-version: "2.27.0"
